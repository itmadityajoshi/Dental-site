<!-- templates/accounts/login.html -->
<!doctype html>
<html>
  <head>
    <title>Login | Dental Clinic</title>
  </head>
  <body>
    <h2>Login to Dental Clinic</h2>

    <!-- Add this block to show errors -->
    {% if form.errors %}
    <div style="color: red">
      <p>Login failed. Please check your username and password.</p>
      {{ form.errors }}
    </div>
    {% endif %}

    <form method="POST">
      {% csrf_token %} {{ form.as_p }}
      <button type="submit">Login</button>
    </form>
    <p>No account? <a href="/accounts/register/">Register here</a></p>
  </body>
</html>
