<!-- templates/base.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Dental Clinic{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen">
    
    {% block navbar %}
         <!-- Navbar -->
    <nav class="bg-white shadow-md px-6 py-4 flex justify-between items-center">
      <h1 class="text-xl font-bold text-blue-600">🦷 Dental Clinic</h1>
      <div>
        {% if request.user.is_authenticated %}
        <span class="text-gray-600 mr-4">{{ request.user.username }}</span>
        <a href="/accounts/logout/" class="text-red-500 hover:underline"
          >Logout</a
        >
        {% else %}
        <a href="/accounts/login/" class="text-blue-500 hover:underline mr-4"
          >Login</a
        >
        <a href="/accounts/register/" class="text-blue-500 hover:underline"
          >Register</a
        >
        {% endif %}
      </div>
    </nav>

    {% endblock navbar %}
        
   
    <!-- Main content -->
    <main class="container mx-auto mt-8 px-4">
      {% block content %} {% endblock %}
    </main>
  </body>
</html>
